<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkFlow Premium - Empleos Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive-mobile.css">
    <style>
        /* Fallback inmediato para evitar interferencias blancas */
        body { background-color: #07070f !important; }
    </style>
</head>
<body>

<div id="formalNoticeModal" class="formal-modal">
    <div class="formal-modal-content glass">
        <div style="width:70px;height:70px;background:rgba(10,132,255,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;">
            <i class="fas fa-shield-alt" style="font-size:2.2rem;color:var(--blue);"></i>
        </div>
        <h2 id="formalNoticeTitle" style="margin-bottom:14px;font-weight:800;letter-spacing:-0.5px;font-size:1.4rem;"></h2>
        <p id="formalNoticeMessage" style="color:var(--text-secondary);line-height:1.7;margin-bottom:32px;font-size:0.95rem;"></p>
        <button onclick="closeFormalNotice()" class="btn-premium" style="width:100%;padding:15px;font-size:0.95rem;justify-content:center;">
            <i class="fas fa-check"></i> Entendido, acepto las condiciones
        </button>
    </div>
</div>

<div id="croppingModal" class="cropping-modal">
    <div class="cropping-modal-content glass">
        <h2 style="margin-bottom:6px;font-weight:800;letter-spacing:-0.5px;">Recortar Imagen</h2>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:20px;">Arrastra el círculo para ajustar tu foto de perfil</p>
        <div class="crop-wrapper">
            <img id="imageToCrop" src="" alt="Imagen a recortar">
            <div id="cropSelector"></div>
        </div>
        <canvas id="croppingCanvas" style="display:none;"></canvas>
        <div style="display:flex;gap:12px;margin-top:10px;">
            <button onclick="closeCroppingModal()" class="btn-premium btn-ghost" style="flex:1;justify-content:center;padding:13px;">Cancelar</button>
            <button id="cropAndSaveBtn" class="btn-premium" style="flex:2;justify-content:center;padding:13px;">
                <i class="fas fa-crop-alt"></i> Recortar y Guardar
            </button>
        </div>
    </div>
</div>

<div id="notification-container"></div>
<div id="app"></div>

<script src="app.js"></script>
</body>
</html>
